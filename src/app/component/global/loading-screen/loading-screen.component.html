<div class="loading-screen" *ngIf="isLoading">
  <div class="loading-content">
    <div class="logo-container">
      <img 
        src="assets/images/footerLogo.png" 
        alt="طريق القيادة" 
        class="loading-logo"
        loading="eager"
        fetchpriority="high"
        decoding="sync"
        width="250"
        height="auto">
    </div>
    <div class="spinner-container">
      <div class="spinner"></div>
    </div>
  </div>
</div>
