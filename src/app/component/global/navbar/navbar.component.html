<nav class="navbar">
  <div class="navbar-container ">
    <div class="navbar-brand">
      <a routerLink="/" class="logo">
        <div class="logo-icon">
          <img src="../../../../assets/images/nav-logo.png" alt="طريق القيادة لتأجير السيارات">
        </div>
        
      </a> 
    </div> 
    
    <div class="navbar-right">
      

      <ul class="navbar-menu" [class.mobile-open]="isMenuOpen" (click)="$event.stopPropagation()">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenuIfMobile()">الرئيسية</a></li>
        <li><a routerLink="/cars" routerLinkActive="active" (click)="closeMenuIfMobile()">السيارات</a></li>
        <!-- Do NOT use routerLinkActive here because it shares the same route "/" with "الرئيسية" -->
        <li><a routerLink="/" fragment="app-download" (click)="closeMenuIfMobile()">انضم الينا</a></li>
        <li class="mobile-only" *ngIf="isLoggedIn"><a routerLink="/profile" routerLinkActive="active" (click)="closeMenuIfMobile()">الملف الشخصي</a></li>
      </ul>

      <div class="navbar-actions " *ngIf="!isLoggedIn">
        <button class="btn-login" (click)="openLogin()">الدخول</button>
        <button class="btn-register" (click)="openRegister()">انشاء حساب</button>
      </div>

      <div class="navbar-actions" *ngIf="isLoggedIn">
        <a routerLink="/profile" class="profile-icon-link" (click)="closeMenuIfMobile()">
          <svg class="profile-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20.59 22C20.59 18.13 16.74 15 12 15C7.26 15 3.41 18.13 3.41 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>

      <button class="navbar-toggle" [class.active]="isMenuOpen" (click)="toggleMenu()" aria-label="القائمة">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

</nav>
